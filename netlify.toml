[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_DISABLE_NETLIFY_EDGE = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/_next/static/chunks/*.css"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "/_next/static/css/*.css"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css"